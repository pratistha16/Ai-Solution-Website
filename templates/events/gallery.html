<!DOCTYPE html>
<html>
<head>
    <title>Event Gallery</title>
</head>
<body>
    <h1>Event Gallery</h1>
    <div class="gallery">
        {% for image in images %}
        <div class="gallery-item">
            <img src="{{ image.image.url }}" alt="{{ image.caption }}">
            <p>{{ image.caption }}</p>
            <p>From: {{ image.event.title }}</p>
        </div>
        {% endfor %}
    </div>
</body>
</html>
