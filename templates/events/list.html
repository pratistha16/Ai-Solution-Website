<!DOCTYPE html>
<html>
<head>
    <title>Events</title>
</head>
<body>
    <h1>Upcoming Events</h1>
    <ul>
    {% for event in events %}
        <li>
            <a href="{{ event.get_absolute_url }}">{{ event.title }}</a>
            <p>{{ event.date }}</p>
        </li>
    {% endfor %}
    </ul>
</body>
</html>
