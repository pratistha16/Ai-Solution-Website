{% extends "base.html" %}
{% load static %}

{% block title %}Contact Us{% endblock %}

{% block content %}
<h1 class="text-4xl font-bold mb-8 text-center">Contact Us</h1>

<div class="max-w-2xl mx-auto bg-white shadow-lg rounded-lg p-6">

    <form method="POST" action="" class="space-y-4">
        {% csrf_token %}
        <div>
            <label for="name" class="block font-medium text-gray-700">Name</label>
            <input type="text" name="name" id="name" class="w-full border rounded px-3 py-2">
        </div>
        <div>
            <label for="email" class="block font-medium text-gray-700">Email</label>
            <input type="email" name="email" id="email" class="w-full border rounded px-3 py-2">
        </div>
        <div>
            <label for="message" class="block font-medium text-gray-700">Message</label>
            <textarea name="message" id="message" rows="5" class="w-full border rounded px-3 py-2"></textarea>
        </div>
        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
            Send Message
        </button>
    </form>

</div>
{% endblock %}
