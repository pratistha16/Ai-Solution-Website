{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Solutions Platform{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-gray-100 font-sans">

    <!-- Header -->
    <header class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">

                <!-- Logo (Left) -->
                <div class="flex-shrink-0">
                    <a href="{% url 'solutions:solution_list' %}">
                        <img class="h-10 w-auto" src="{% static 'images/logo.png' %}" alt="Logo">
                    </a>
                </div>

               <!-- Navigation (Center) -->
<nav class="hidden md:flex space-x-6">
    <a href="{% url 'solutions:solution_list' %}"
        class="text-gray-700 hover:text-blue-600 font-medium">Home</a>
    <a href="{% url 'solutions:solution_list' %}"
        class="text-gray-700 hover:text-blue-600 font-medium">Solutions</a>
    <a href="{% url 'articles:article_list' %}"
        class="text-gray-700 hover:text-blue-600 font-medium">Articles</a>
    <a href="{% url 'blogs:blog_list' %}"
        class="text-gray-700 hover:text-blue-600 font-medium">Blogs</a>
    <a href="{% url 'events:event_list' %}"
        class="text-gray-700 hover:text-blue-600 font-medium">Events</a>
    <a href="{% url 'feedback:feedback_list' %}"
        class="text-gray-700 hover:text-blue-600 font-medium">Customer Feedback</a>
    <a href="{% url 'contact:contact_list' %}"
        class="text-gray-700 hover:text-blue-600 font-medium">Contact Us</a>
</nav>

                <!-- Search Bar (Right) -->
                <div class="flex items-center space-x-4">
                    <form method="GET" action="{% url 'solutions:solution_list' %}" class="relative">
                        <input type="text" name="q" placeholder="Search..."
                            class="border rounded-full py-1 px-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                            value="{{ request.GET.q }}">
                        <button type="submit"
                            class="absolute right-0 top-0 mt-1 mr-2 text-gray-500 hover:text-blue-600">
                            🔍
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="mt-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            {% block content %}
            <!-- Page-specific content goes here -->
            {% endblock %}
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white mt-12 shadow-inner">
        <div class="max-w-7xl mx-auto px-4 py-6 text-center text-gray-500">
            &copy; {{ now|date:"Y" }} AI Solutions Platform. All rights reserved.
        </div>
    </footer>

</body>

</html>
