{% extends "admin/base.html" %}

{% block content %}
<div class="bg-white p-6 rounded-lg shadow mb-6 max-w-lg mx-auto text-center">
  <h2 class="text-2xl font-semibold mb-4">Delete Blog</h2>
  <p class="text-gray-700 mb-6">
    Are you sure you want to delete the blog 
    <span class="font-semibold">“{{ object.title }}”</span>?
  </p>

  <form method="post" class="flex justify-center space-x-4">
    {% csrf_token %}
    <a href="{% url 'custom_admin:admin_blog_list' %}"
       class="px-4 py-2 rounded bg-gray-200 text-gray-700 hover:bg-gray-300">
      Cancel
    </a>
    <button type="submit"
            class="px-4 py-2 rounded bg-red-600 text-white hover:bg-red-700">
      Yes, Delete
    </button>
  </form>
</div>
{% endblock %}
