{% extends 'admin/base.html' %}

{% block content %}
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
    <div class="bg-white p-6 rounded-lg shadow">
        <h3 class="text-lg font-semibold mb-2">Solutions</h3>
        <p class="text-3xl font-bold text-blue-600">{{ stats.solutions_count }}</p>
    </div>
    <div class="bg-white p-6 rounded-lg shadow">
        <h3 class="text-lg font-semibold mb-2">Articles</h3>
        <p class="text-3xl font-bold text-green-600">{{ stats.articles_count }}</p>
    </div>
    <div class="bg-white p-6 rounded-lg shadow">
        <h3 class="text-lg font-semibold mb-2">Events</h3>
        <p class="text-3xl font-bold text-purple-600">{{ stats.events_count }}</p>
    </div>
    <div class="bg-white p-6 rounded-lg shadow">
        <h3 class="text-lg font-semibold mb-2">Contacts</h3>
        <p class="text-3xl font-bold text-red-600">{{ stats.contacts_count }}</p>
    </div>
</div>
{% endblock %}
