{% extends 'admin/base.html' %}

{% block content %}
<h2 class="text-2xl font-semibold mb-4">Delete Event</h2>
<p>Are you sure you want to delete "<strong>{{ object.title }}</strong>"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Confirm Delete</button>
    <a href="{% url 'custom_admin:admin_event_list' %}" class="ml-2 bg-gray-300 px-4 py-2 rounded hover:bg-gray-400">Cancel</a>
</form>
{% endblock %}
