{% extends "base.html" %}
{% block title %}All Blogs{% endblock %}
{% block content %}
{% load static %}
<h1 class="text-4xl font-bold mb-8 text-center">Our Blogs</h1>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    {% for blog in blogs %}
    <div class="bg-white shadow-lg rounded-lg overflow-hidden">
        {% if blog.image %}
        <img src="{{ blog.image.url }}" alt="{{ blog.title }}" class="w-full h-48 object-cover">
        {% endif %}
        <div class="p-4">
            <h2 class="text-2xl font-semibold mb-2">
                <a href="{% url 'blogs:blog_detail' blog.slug %}" class="text-blue-600 hover:underline">{{ blog.title }}</a>
            </h2>
            <p class="text-gray-700 line-clamp-3">{{ blog.content|truncatechars:150 }}</p>
        </div>
    </div>
    {% empty %}
    <p class="text-gray-500 col-span-3 text-center">No blogs available yet.</p>
    {% endfor %}
</div>
{% endblock %}
